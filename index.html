<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Box Annotator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <h1>Image Box Annotator</h1>
          <p>Draw boxes on images</p>
        </div>

        <div class="controls">
          <button id="openFolderBtn" type="button">Open Folder</button>
          <input id="folderInput" type="file" webkitdirectory multiple accept="image/*" hidden />
          <button id="selectImagesBtn" class="ghost-button" type="button">Select Images</button>
          <input id="imageInput" type="file" multiple accept="image/*" hidden />
          <button id="chooseOutputBtn" class="ghost-button" type="button" disabled>
            Choose Output Folder
          </button>
          <button id="saveImagesBtn" type="button" disabled>Save Images</button>
          <div id="loadProgress" class="load-progress" hidden>
            <div class="load-progress-track">
              <div id="loadProgressBar" class="load-progress-bar"></div>
            </div>
            <span id="loadProgressLabel" class="load-progress-label">0 / 0</span>
          </div>
        </div>

        <div class="stats">
          <span id="imageCount">0 images</span>
          <span id="boxCount">0 boxes</span>
        </div>

        <div id="imageList" class="image-list" role="list"></div>
      </aside>

      <section class="workspace">
        <header class="toolbar">
          <div class="nav-controls">
            <button id="prevBtn" type="button" disabled title="Previous image">‹</button>
            <button id="nextBtn" type="button" disabled title="Next image">›</button>
            <span id="currentName" class="current-name">No images loaded</span>
          </div>
          <div class="edit-controls">
            <button id="deleteBtn" type="button" disabled>Delete Box</button>
            <button id="clearBtn" type="button" disabled>Clear Image</button>
          </div>
        </header>

        <div id="canvasWrap" class="canvas-wrap">
          <div id="emptyState" class="empty-state">
            <strong>Open a folder, select images, or drop images here</strong>
            <span>Drag on an image to draw a box. Click an existing box to select it.</span>
          </div>
          <canvas id="canvas"></canvas>
        </div>

        <footer class="statusbar">
          <span id="statusText">Supports JPG, PNG, GIF, WebP, and BMP.</span>
          <span id="cursorText"></span>
        </footer>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
